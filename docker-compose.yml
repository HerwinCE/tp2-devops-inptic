services:
  app:
    build: ./app
    ports:
      - "5000:5000"
    restart: unless-stopped
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    restart: unless-stopped
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: unless-stopped
    networks:
      - monitoring

  jenkins:
    image: jenkins/jenkins:lts
    user: root
    ports:
      - "8084:8080"
      - "50001:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
      - /home/herwin/tp2_devops:/workspace
    restart: unless-stopped
    networks:
      - monitoring

volumes:
  jenkins_home:

networks:
  monitoring:
    driver: bridge
